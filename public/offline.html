<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A1128" />
  <title>AJIMINO HR — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A1128;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: #16224a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 90px;
      object-fit: contain;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
      color: #6366f1;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      max-width: 300px;
      line-height: 1.6;
      margin: 0 auto 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #4338ca;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #3730a3; }

    .status {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="/icons/icon-96x96.png" alt="AJIMINO HR" onerror="this.style.display='none'" />
  </div>

  <div class="icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>

  <button class="btn" onclick="tryReconnect()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    Try Again
  </button>

  <p class="status" id="status"></p>

  <script>
    function tryReconnect() {
      const btn = document.querySelector('.btn');
      btn.textContent = 'Checking...';
      btn.disabled = true;
      // Try to fetch a small resource to verify connectivity
      fetch('/manifest.json', { cache: 'no-store' })
        .then(() => { window.location.reload(); })
        .catch(() => {
          btn.innerHTML = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg> Try Again`;
          btn.disabled = false;
          document.getElementById('status').textContent = 'Still no connection. Please check your network.';
        });
    }

    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored! Reloading…';
      setTimeout(() => window.location.reload(), 800);
    });
  </script>
</body>
</html>
